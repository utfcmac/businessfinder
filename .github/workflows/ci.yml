name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run TypeScript check (backend)
        run: npx tsc --noEmit

      - name: Run TypeScript check (frontend)
        run: cd frontend && npx tsc --noEmit

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Check build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Backend build not created"
            exit 1
          fi
          if [ ! -d "frontend/dist" ]; then
            echo "❌ Frontend build not created"
            exit 1
          fi
          echo "✅ Build successful"

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (if configured)
        run: |
          if [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ]; then
            npm run lint || echo "⚠️  No lint script found"
          else
            echo "⚠️  ESLint not configured, skipping"
          fi
        continue-on-error: true
